<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NELA - Windows AI Assistant</title>
    <style>
        :root {
            --bg-color: #0b0e14; 
            --glow-color: #1a2a3a;
            --accent-color: #00bcd4;
            --card-bg: rgba(23, 28, 38, 0.7);
            --text-color: #e6edf3;
            --success: #238636;
            --warning: #ff9800;
            --error: #f85149;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at top right, var(--glow-color), transparent),
                radial-gradient(circle at bottom left, #050505, transparent);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 28px;
            background: linear-gradient(135deg, rgba(0, 188, 212, 0.1), rgba(0, 0, 0, 0.3));
            border-bottom: 2px solid rgba(0, 188, 212, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: var(--accent-color);
            text-shadow: 0 0 15px var(--accent-color);
            letter-spacing: 2px;
        }

        .header-right {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .stats {
            font-size: 13px;
            color: #8b949e;
            font-family: 'Consolas', monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid rgba(0, 188, 212, 0.2);
        }

        .btn-help {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(0, 188, 212, 0.3);
        }

        .btn-help:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 188, 212, 0.6);
        }

        /* CHAT AREA */
        #chat-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-color) transparent;
        }

        #chat-area::-webkit-scrollbar {
            width: 8px;
        }

        #chat-area::-webkit-scrollbar-track {
            background: transparent;
        }

        #chat-area::-webkit-scrollbar-thumb {
            background: var(--accent-color);
            border-radius: 4px;
        }

        .message {
            padding: 14px 20px;
            border-radius: 12px;
            max-width: 75%;
            line-height: 1.6;
            font-size: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            animation: slideIn 0.3s ease-out;
            word-wrap: break-word;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-msg {
            align-self: flex-end;
            background: linear-gradient(135deg, #238636, #1a5f2d);
            border-bottom-right-radius: 2px;
            border-left: 3px solid var(--accent-color);
        }

        .nela-msg {
            align-self: flex-start;
            background: linear-gradient(135deg, #161b22, #0d1117);
            border: 1px solid var(--accent-color);
            border-bottom-left-radius: 2px;
            border-left: 3px solid var(--accent-color);
        }

        .message b {
            color: var(--accent-color);
        }

        /* INPUT AREA */
        .input-wrapper {
            display: flex;
            justify-content: center;
            padding: 30px;
            background: linear-gradient(to top, var(--bg-color), transparent);
        }

        .input-container {
            display: flex;
            align-items: center;
            width: 65%;
            min-width: 450px;
            background: var(--card-bg);
            border-radius: 30px;
            border: 2px solid var(--accent-color);
            padding: 8px 22px;
            backdrop-filter: blur(15px);
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(0, 188, 212, 0.2);
        }

        .input-container:focus-within {
            border-color: #00d9ff;
            box-shadow: 0 0 30px rgba(0, 188, 212, 0.5);
        }

        input {
            background: transparent;
            border: none;
            color: white;
            flex-grow: 1;
            height: 45px;
            font-size: 16px;
            outline: none;
        }

        input::placeholder {
            color: rgba(230, 237, 243, 0.5);
        }

        /* CONTROL BUTTONS */
        .control-btn {
            width: 24px;
            height: 24px;
            cursor: pointer;
            margin-left: 12px;
            fill: #8b949e;
            transition: 0.3s;
            filter: drop-shadow(0 0 0px rgba(0, 0, 0, 0));
        }

        .control-btn:hover {
            fill: var(--accent-color);
            transform: scale(1.15);
            filter: drop-shadow(0 0 8px var(--accent-color));
        }

        .control-btn.active {
            fill: #ff4b2b;
            filter: drop-shadow(0 0 10px #ff4b2b);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* WELCOME MESSAGE */
        .welcome-banner {
            background: linear-gradient(135deg, rgba(0, 188, 212, 0.2), rgba(0, 188, 212, 0.05));
            border: 1px solid rgba(0, 188, 212, 0.3);
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 10px;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">🤖 NELA OMEGA</div>
        <div class="header-right">
            <div class="stats">
                💻 CPU: <span id="cpu">--</span>% | 🔋 BAT: <span id="bat">--</span>%
            </div>
            <button class="btn-help" onclick="showHelp()">❓ Help</button>
        </div>
    </div>

    <div id="chat-area">
        <div class="message nela-msg welcome-banner">
            <b>🚀 Welcome to Nela!</b><br>
            I'm your Windows AI Assistant. Say "help" or click the Help button to see what I can do!<br>
            <small style="color: #8b949e;">Hotkey: Win+Shift+V (if keyboard library is installed)</small>
        </div>
    </div>

    <div class="input-wrapper">
        <div class="input-container">
            <input 
                type="text" 
                id="userInput" 
                placeholder="Ask me anything... 🎤"
                onkeydown="if(event.key === 'Enter') { sendMsg(); return false; }"
            >
            
            <!-- Microphone/Voice Button -->
            <svg class="control-btn" id="micBtn" onclick="startVoice()" viewBox="0 0 24 24" title="Click to speak or press Win+Shift+V">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
        </div>
    </div>

    <script>
        // ===== CORE MESSAGE HANDLING =====
        function nelaResponse(text) {
            document.getElementById('micBtn').classList.remove('active');
            appendMessage(text, 'nela-msg');
        }

        function sendMsg() {
            let input = document.getElementById('userInput');
            let val = input.value.trim();
            if (val !== "") {
                appendMessage(`<b>You:</b> ${val}`, 'user-msg');
                input.value = "";
                input.focus();
                if (window.pywebview && window.pywebview.api) {
                    window.pywebview.api.handle_command(val);
                }
            }
        }

        // ===== VOICE INPUT =====
        function startVoice() {
            let btn = document.getElementById('micBtn');
            if (btn.classList.contains('active')) {
                btn.classList.remove('active');
                return;
            }
            
            btn.classList.add('active');
            if (window.pywebview && window.pywebview.api) {
                window.pywebview.api.start_voice_cmd();
            }
        }

        // ===== MESSAGE DISPLAY =====
        function appendMessage(text, className) {
            let div = document.createElement('div');
            div.className = 'message ' + className;
            div.innerHTML = text;
            document.getElementById('chat-area').appendChild(div);
            
            // Auto-scroll to bottom
            let chatArea = document.getElementById('chat-area');
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // ===== HARDWARE MONITORING =====
        function updateStats(cpu, bat) {
            document.getElementById('cpu').innerText = Math.round(cpu);
            document.getElementById('bat').innerText = Math.round(bat);
        }

        // ===== HELP FUNCTION =====
        function showHelp() {
            if (window.pywebview && window.pywebview.api) {
                window.pywebview.api.show_help();
            }
        }

        // ===== AUTO-FOCUS INPUT =====
        document.getElementById('userInput').focus();
    </script>
</body>
</html>
