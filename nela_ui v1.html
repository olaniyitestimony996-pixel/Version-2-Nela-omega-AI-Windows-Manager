<!DOCTYPE html>
<html>
<head>
    <style>
        :root {
            --bg-color: #0b0e14; 
            --glow-color: #1a2a3a;
            --accent-color: #00bcd4;
            --card-bg: rgba(23, 28, 38, 0.7);
            --text-color: #e6edf3;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, var(--glow-color), transparent),
                              radial-gradient(circle at bottom left, #050505, transparent);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        /* HEADER */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }
        .logo { font-size: 20px; font-weight: bold; color: var(--accent-color); text-shadow: 0 0 10px var(--accent-color); }
        .stats { font-size: 13px; color: #8b949e; font-family: 'Consolas', monospace; }

        /* CHAT AREA (Fills Middle) */
        #chat-area { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            scrollbar-width: thin;
            scrollbar-color: var(--accent-color) transparent;
        }
        .message { padding: 14px 20px; border-radius: 18px; max-width: 75%; line-height: 1.5; font-size: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .user-msg { align-self: flex-end; background-color: #238636; border-bottom-right-radius: 2px; }
        .nela-msg { align-self: flex-start; background-color: #161b22; border: 1px solid #30363d; border-bottom-left-radius: 2px; }

        /* CENTERED COMPACT INPUT AT BOTTOM */
        .input-wrapper { display: flex; justify-content: center; padding: 30px; background: linear-gradient(transparent, var(--bg-color)); }
        .input-container {
            display: flex; align-items: center; 
            width: 60%; min-width: 400px;
            background: var(--card-bg); border-radius: 30px; 
            border: 2px solid #30363d; padding: 5px 20px;
            backdrop-filter: blur(15px);
            animation: spark-breathe 4s infinite ease-in-out;
        }

        @keyframes spark-breathe {
            0% { border-color: #30363d; box-shadow: 0 0 5px rgba(0, 188, 212, 0.1); }
            50% { border-color: var(--accent-color); box-shadow: 0 0 25px rgba(0, 188, 212, 0.4); }
            100% { border-color: #30363d; box-shadow: 0 0 5px rgba(0, 188, 212, 0.1); }
        }

        input { background: transparent; border: none; color: white; flex-grow: 1; height: 45px; font-size: 16px; outline: none; }

        /* NEON MIC */
        .mic-btn { width: 24px; height: 24px; cursor: pointer; margin-left: 12px; fill: #8b949e; transition: 0.3s; }
        .mic-btn:hover { fill: var(--accent-color); transform: scale(1.1); }
        .mic-active { fill: #ff4b2b !important; filter: drop-shadow(0 0 8px #ff4b2b); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">NELA AI CEO</div>
        <div class="stats">
            CPU: <span id="cpu">--</span>% | BAT: <span id="bat">--</span>%
        </div>
    </div>

    <div id="chat-area">
        <div class="message nela-msg">
            <b>Systems Ready, Senior Man.</b><br>
            The Glow is active. I am Nela, the laptop CEO.
        </div>
    </div>

    <div class="input-wrapper">
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Command Nela..." onkeydown="if(event.key === 'Enter') { sendMsg(); return false; }">
            
            <svg class="mic-btn" id="micBtn" onclick="startVoice()" viewBox="0 0 24 24">
                <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
            </svg>
        </div>
    </div>

    <script>
        // Catch responses from Python
        function nelaResponse(text) {
            document.getElementById('micBtn').classList.remove('mic-active');
            appendMessage(text, 'nela-msg');
        }

        // Send text to Python
        function sendMsg() {
            let input = document.getElementById('userInput');
            let val = input.value.trim();
            if (val !== "") {
                appendMessage(val, 'user-msg');
                input.value = "";
                if (window.pywebview && window.pywebview.api) {
                    window.pywebview.api.handle_command(val);
                }
            }
        }

        // Trigger Mic in Python
        function startVoice() {
            document.getElementById('micBtn').classList.add('mic-active');
            if (window.pywebview && window.pywebview.api) {
                window.pywebview.api.start_voice_cmd();
            }
        }

        // Add bubbles to screen
        function appendMessage(text, className) {
            let div = document.createElement('div');
            div.className = 'message ' + className;
            div.innerHTML = text;
            document.getElementById('chat-area').appendChild(div);
            document.getElementById('chat-area').scrollTop = document.getElementById('chat-area').scrollHeight;
        }

        // Update Hardware numbers
        function updateStats(cpu, bat) {
            document.getElementById('cpu').innerText = cpu;
            document.getElementById('bat').innerText = bat;
        }

        // Reset mic if error
        function stopVoice(msg) {
            document.getElementById('micBtn').classList.remove('mic-active');
            if(msg) appendMessage(msg, 'nela-msg');
        }
    </script>
</body>
</html>
